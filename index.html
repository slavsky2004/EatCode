<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счётчик калорий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        .daily-goal {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            height: 100%;
            transition: width 0.5s;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }
        .form-section, .list-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .food-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .food-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #dc3545;
            width: auto;
            padding: 8px 15px;
            margin: 0;
        }
        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥗 Счётчик калорий</h1>
            <p>Контролируйте питание и достигайте целей!</p>
        </div>

        <div class="daily-goal">
            <div style="display: flex; justify-content: space-between;">
                <span>🎯 Дневная норма</span>
                <span id="goalCurrent">0 / 2000 ккал</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div style="margin-top: 10px; display: flex; gap: 10px;">
                <input type="number" id="dailyGoalInput" placeholder="Норма" value="2000">
                <button onclick="setDailyGoal()" style="width: auto; margin: 0;">Установить</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalCalories">0</div><div>Всего калорий</div></div>
            <div class="stat-card"><div class="stat-value" id="totalProtein">0</div><div>Белки (г)</div></div>
            <div class="stat-card"><div class="stat-value" id="totalFat">0</div><div>Жиры (г)</div></div>
            <div class="stat-card"><div class="stat-value" id="totalCarbs">0</div><div>Углеводы (г)</div></div>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h3>➕ Добавить продукт</h3>
                <div class="form-group"><label>Название</label><input type="text" id="foodName" placeholder="Куриная грудка"></div>
                <div class="form-group"><label>Вес (г)</label><input type="number" id="weight" value="100"></div>
                <div class="form-group"><label>Ккал на 100г</label><input type="number" id="calories"></div>
                <div class="form-group"><label>Белки на 100г</label><input type="number" id="protein" value="0" step="0.1"></div>
                <div class="form-group"><label>Жиры на 100г</label><input type="number" id="fat" value="0" step="0.1"></div>
                <div class="form-group"><label>Углеводы на 100г</label><input type="number" id="carbs" value="0" step="0.1"></div>
                <button onclick="addFood()">Добавить</button>
                <button class="btn-secondary" onclick="addExamples()">📝 Примеры</button>
                <button class="btn-secondary" onclick="clearAll()" style="background:#dc3545;">🗑 Очистить всё</button>
            </div>
            <div class="list-section">
                <h3>📋 Дневной рацион</h3>
                <div class="food-list" id="foodList"></div>
            </div>
        </div>
    </div>

    <script>
        let foods = JSON.parse(localStorage.getItem('foods') || '[]');
        let dailyGoal = parseInt(localStorage.getItem('dailyGoal') || '2000');
        
        document.getElementById('dailyGoalInput').value = dailyGoal;
        
        function save() {
            localStorage.setItem('foods', JSON.stringify(foods));
            updateDisplay();
        }
        
        function addFood() {
            let name = document.getElementById('foodName').value.trim();
            let weight = parseFloat(document.getElementById('weight').value);
            let cal = parseFloat(document.getElementById('calories').value);
            if(!name || weight<=0 || isNaN(cal)) { alert('Заполните название, вес и калории'); return; }
            foods.push({
                id: Date.now(),
                name: name,
                weight: weight,
                calPer100: cal,
                protPer100: parseFloat(document.getElementById('protein').value)||0,
                fatPer100: parseFloat(document.getElementById('fat').value)||0,
                carbsPer100: parseFloat(document.getElementById('carbs').value)||0
            });
            save();
            document.getElementById('foodName').value = '';
            document.getElementById('calories').value = '';
        }
        
        function deleteFood(id) {
            foods = foods.filter(f => f.id !== id);
            save();
        }
        
        function clearAll() {
            if(confirm('Удалить всё?')) { foods = []; save(); }
        }
        
        function setDailyGoal() {
            dailyGoal = parseInt(document.getElementById('dailyGoalInput').value) || 2000;
            localStorage.setItem('dailyGoal', dailyGoal);
            updateDisplay();
        }
        
        function addExamples() {
            foods.push({id:Date.now(), name:"🍚 Гречка", weight:150, calPer100:110, protPer100:3.6, fatPer100:1.2, carbsPer100:21.3});
            foods.push({id:Date.now()+1, name:"🍗 Курица", weight:200, calPer100:165, protPer100:31, fatPer100:3.6, carbsPer100:0});
            foods.push({id:Date.now()+2, name:"🥚 Яйца (2шт)", weight:110, calPer100:155, protPer100:12.6, fatPer100:10.6, carbsPer100:1.1});
            save();
        }
        
        function updateDisplay() {
            let totalCal=0, totalProt=0, totalFat=0, totalCarb=0;
            let html = '';
            foods.forEach(f => {
                let factor = f.weight/100;
                let cal = f.calPer100 * factor;
                let prot = f.protPer100 * factor;
                let fat = f.fatPer100 * factor;
                let carbs = f.carbsPer100 * factor;
                totalCal += cal; totalProt += prot; totalFat += fat; totalCarb += carbs;
                html += `<div class="food-item"><div><b>${f.name}</b><br>${f.weight}г | ${Math.round(cal)} ккал | Б:${prot.toFixed(1)} Ж:${fat.toFixed(1)} У:${carbs.toFixed(1)}</div><button class="delete-btn" onclick="deleteFood(${f.id})">✕</button></div>`;
            });
            document.getElementById('foodList').innerHTML = html || '<div class="empty-message">🍽️ Список пуст. Добавьте продукты!</div>';
            document.getElementById('totalCalories').innerText = Math.round(totalCal);
            document.getElementById('totalProtein').innerText = totalProt.toFixed(1);
            document.getElementById('totalFat').innerText = totalFat.toFixed(1);
            document.getElementById('totalCarbs').innerText = totalCarb.toFixed(1);
            
            let percent = (totalCal / dailyGoal) * 100;
            document.getElementById('progressFill').style.width = Math.min(percent, 100) + '%';
            document.getElementById('goalCurrent').innerHTML = `${Math.round(totalCal)} / ${dailyGoal} ккал`;
        }
        
        updateDisplay();
    </script>
</body>
</html>
